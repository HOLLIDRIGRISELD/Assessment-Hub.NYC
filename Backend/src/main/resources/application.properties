spring.application.name=Backend
# DEFINES APPLICATION NAME

# DEFINES SERVER PORT FOR BACKEND
server.port=8080

# CONFIGURES DATABASE CONNECTION URL
spring.datasource.url=jdbc:mysql://localhost:3306/hub_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# DEFINES DATABASE USERNAME
spring.datasource.username=root

# DEFINES DATABASE PASSWORD
spring.datasource.password=rootpassword

# CONFIGURES AUTO TABLE CREATION AND UPDATE
spring.jpa.hibernate.ddl-auto=update

# ENABLES SQL QUERY LOGGING
spring.jpa.show-sql=true

# SETS HIBERNATE DIALECT FOR MYSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect 