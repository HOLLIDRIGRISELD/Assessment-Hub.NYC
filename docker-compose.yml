# DEFINE DOCKER COMPOSE VERSION
version: '3.8'

services:

  # MYSQL DATABASE SERVICE WITH PERSISTENT STORAGE
  mysql-db:
    image: mysql:8.0
    container_name: assessment_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  # PHPMYADMIN WEB INTERFACE FOR DATABASE MANAGEMENT
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: assessment_pma
    environment:
      PMA_HOST: mysql-db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - mysql-db
    restart: unless-stopped

  # PYTHON AI MICROSERVICE FOR ML PREDICTIONS
  ai-service:
    build: ./Ai-Model
    container_name: assessment_ai
    ports:
      - "5000:5000"
    restart: unless-stopped

  # SPRING BOOT BACKEND CONNECTED TO DATABASE AND AI SERVICE
  backend:
    build: ./Backend
    container_name: assessment_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE:-assess_ai}?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-root}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-root}
    depends_on:
      - mysql-db
      - ai-service
    restart: unless-stopped

  # REACT FRONTEND SERVED THROUGH NGINX
  frontend:
    build: ./Frontend
    container_name: assessment_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

# DEFINE NAMED VOLUME FOR DATABASE PERSISTENCE
volumes:
  db_data: